##
## Default strfry config
##

# Directory that contains the strfry LMDB database (restart required)
db = "./strfry-db/"

dbParams {
    # Maximum number of threads/processes that can simultaneously have LMDB transactions open (restart required)
    maxreaders = 1024

    # Size of mmap() to use when loading LMDB (default is 10TB, does *not* correspond to disk-space used) (restart required)
    mapsize = 10995116277760

    # Disables read-ahead when accessing the LMDB mapping. Reduces IO activity when DB size is larger than RAM. (restart required)
    noReadAhead = false
}

events {
    # Maximum size of normalised JSON, in bytes
    maxEventSize = 65536

    # Events newer than this will be rejected
    rejectEventsNewerThanSeconds = 900

    # Events older than this will be rejected
    rejectEventsOlderThanSeconds = 94608000

    # Ephemeral events older than this will be rejected
    rejectEphemeralEventsOlderThanSeconds = 60

    # Ephemeral events will be deleted from the DB when older than this
    ephemeralEventsLifetimeSeconds = 300

    # Maximum number of tags allowed
    maxNumTags = 4000

    # Maximum size for tag values, in bytes
    maxTagValSize = 1024
}

relay {
    # Interface to listen on. Use 0.0.0.0 to listen on all interfaces (restart required)
    bind = "0.0.0.0"

    # Port to open for the nostr websocket protocol (restart required)
    port = 7777

    # Set OS-limit on maximum number of open files/sockets (if 0, don't attempt to set) (restart required)
    nofiles = 1000000

    # HTTP header that contains the client's real IP, before reverse proxying (ie x-real-ip) (MUST be all lower-case)
    realIpHeader = "cf-connecting-ip"

    info {
        # NIP-11: Name of this server. Short/descriptive (< 30 characters)
        name = "kojirelay"

        # NIP-11: Detailed information about relay, free-form
        description = "kojira's japanese relay"

        # NIP-11: Administrative nostr pubkey, for contact purposes
        pubkey = "b3e43e8cc7e6dff23a33d9213a3e912d895b1c3e4250240e0c99dbefe3068b5f"

        # NIP-11: Alternative administrative contact (email, website, etc)
        contact = ""

        # NIP-11: URL pointing to an image to be used as an icon for the relay
        icon = "https://kojira.io/favicon.ico"

        # List of supported lists as JSON array, or empty string to use default. Example: "[1,2]"
        nips = ""
    }

    # Maximum accepted incoming websocket frame size (should be larger than max event) (restart required)
    maxWebsocketPayloadSize = 131072

    # Maximum number of filters allowed in a REQ
    maxReqFilterSize = 30

    # Websocket-level PING message frequency (should be less than any reverse proxy idle timeouts) (restart required)
    autoPingSeconds = 55

    # If TCP keep-alive should be enabled (detect dropped connections to upstream reverse proxy)
    enableTcpKeepalive = false

    # How much uninterrupted CPU time a REQ query should get during its DB scan
    queryTimesliceBudgetMicroseconds = 10000

    # Maximum records that can be returned per filter
    maxFilterLimit = 1000

    # Maximum number of subscriptions (concurrent REQs) a connection can have open at any time
    maxSubsPerConnection = 30

    writePolicy {
        # If non-empty, path to an executable script that implements the writePolicy plugin logic
        plugin = ""
    }

    rateLimit {
        # Enable per-pubkey posting rate limiting
        enabled = true

        # Time window (seconds) over which posts per pubkey are counted.
        # A longer window separates one-time bursts (fixed count) from sustained spam (scales with time).
        windowSeconds = 180

        # Maximum number of events a single pubkey may post within the window.
        # 100/180s: passes legit bursts (e.g. live-activity directory ~30) but catches sustained spam (drift ~300/180s).
        maxEvents = 100

        # Action when limit exceeded: "reject" (reply OK false) or "shadow" (reply OK true but drop)
        mode = "reject"

        # When a pubkey exceeds the rate limit, permanently ban it (reject ALL its events) until unbanned
        banOnExceed = true

        # File of banned pubkeys (64-char hex, one per line). Loaded at startup; auto-bans are appended.
        # To unban: remove the line from this file and restart the relay.
        banListFile = "./strfry-db/banned-pubkeys.txt"

        # JSON array of event kinds to rate-limit, or "" for all (non-exempt) kinds. Example: "[1,1111]"
        kinds = ""

        # JSON array of event kinds to EXEMPT from rate-limiting (takes precedence). "[7]" = exempt reactions
        excludeKinds = "[7]"

        # Exempt ephemeral kinds (20000-29999) - never stored, can't be abused for storage (e.g. WebRTC)
        exemptEphemeral = true

        # Exempt replaceable kinds (0, 3, 41, 10000-19999) - only latest stored, don't accumulate
        exemptReplaceable = true

        # Exempt addressable kinds (30000-39999). Keep false: they CAN accumulate via d-tags (storage abuse)
        exemptAddressable = false
    }

    ipRateLimit {
        # Per-IP rate limiting is DISABLED: it caused false bans of legit high-volume sources (relay
        # mirror feeds like yabu.me, live-activity directory bots). The real spam is a single pubkey,
        # handled by the per-pubkey limiter above. Manage abusive IPs at Cloudflare's edge instead.
        enabled = false

        # Time window (seconds) over which posts per IP are counted
        windowSeconds = 60

        # Maximum number of events a single IP (or IPv6 /64) may post within the window
        maxEvents = 30

        # Action when limit exceeded: "reject" (reply OK false) or "shadow" (reply OK true but drop)
        mode = "reject"

        # When an IP exceeds the rate limit, permanently ban it (reject ALL its events) until unbanned
        banOnExceed = true

        # File of banned IPs (one per line; IPv6 /64 stored as prefix/64). Auto-bans appended.
        # To unban: remove the line from this file and restart the relay.
        banListFile = "./strfry-db/banned-ips.txt"
    }

    compression {
        # Use permessage-deflate compression if supported by client. Reduces bandwidth, but slight increase in CPU (restart required)
        enabled = true

        # Maintain a sliding window buffer for each connection. Improves compression, but uses more memory (restart required)
        slidingWindow = true
    }

    logging {
        # Dump all incoming messages
        dumpInAll = true

        # Dump all incoming EVENT messages
        dumpInEvents = true

        # Dump all incoming REQ/CLOSE messages
        dumpInReqs = true

        # Log performance metrics for initial REQ database scans
        dbScanPerf = true

        # Log reason for invalid event rejection? Can be disabled to silence excessive logging
        invalidEvents = true
    }

    numThreads {
        # Ingester threads: route incoming requests, validate events/sigs (restart required)
        ingester = 3

        # reqWorker threads: Handle initial DB scan for events (restart required)
        reqWorker = 3

        # reqMonitor threads: Handle filtering of new events (restart required)
        reqMonitor = 3

        # negentropy threads: Handle negentropy protocol messages (restart required)
        negentropy = 2
    }

    negentropy {
        # Support negentropy protocol messages
        enabled = true

        # Maximum records that sync will process before returning an error
        maxSyncEvents = 1000000
    }
}
