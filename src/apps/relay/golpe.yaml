config:
  - name: relay__bind
    desc: "Interface to listen on. Use 0.0.0.0 to listen on all interfaces"
    default: "127.0.0.1"
    noReload: true
  - name: relay__port
    desc: "Port to open for the nostr websocket protocol"
    default: 7777
    noReload: true
  - name: relay__nofiles
    desc: "Set OS-limit on maximum number of open files/sockets (if 0, don't attempt to set)"
    default: 1000000
    noReload: true
  - name: relay__realIpHeader
    desc: "HTTP header that contains the client's real IP, before reverse proxying (ie x-real-ip) (MUST be all lower-case)"
    default: ""

  - name: relay__info__name
    desc: "NIP-11: Name of this server. Short/descriptive (< 30 characters)"
    default: "strfry default"
  - name: relay__info__description
    desc: "NIP-11: Detailed information about relay, free-form"
    default: "This is a strfry instance."
  - name: relay__info__pubkey
    desc: "NIP-11: Administrative nostr pubkey, for contact purposes"
    default: ""
  - name: relay__info__contact
    desc: "NIP-11: Alternative administrative contact (email, website, etc)"
    default: ""
  - name: relay__info__icon
    desc: "NIP-11: URL pointing to an image to be used as an icon for the relay"
    default: ""
  - name: relay__info__nips
    desc: "List of supported lists as JSON array, or empty string to use default. Example: \"[1,2]\""
    default: ""

  - name: relay__maxWebsocketPayloadSize
    desc: "Maximum accepted incoming websocket frame size (should be larger than max event)"
    default: 131072
    noReload: true
  - name: relay__maxReqFilterSize
    desc: "Maximum number of filters allowed in a REQ"
    default: 200
  - name: relay__autoPingSeconds
    desc: "Websocket-level PING message frequency (should be less than any reverse proxy idle timeouts)"
    default: 55
    noReload: true
  - name: relay__enableTcpKeepalive
    desc: "If TCP keep-alive should be enabled (detect dropped connections to upstream reverse proxy)"
    default: false
  - name: relay__queryTimesliceBudgetMicroseconds
    desc: "How much uninterrupted CPU time a REQ query should get during its DB scan"
    default: 10000
  - name: relay__maxFilterLimit
    desc: "Maximum records that can be returned per filter"
    default: 500
  - name: relay__maxSubsPerConnection
    desc: "Maximum number of subscriptions (concurrent REQs) a connection can have open at any time"
    default: 20

  - name: relay__writePolicy__plugin
    desc: "If non-empty, path to an executable script that implements the writePolicy plugin logic"
    default: ""

  - name: relay__compression__enabled
    desc: "Use permessage-deflate compression if supported by client. Reduces bandwidth, but slight increase in CPU"
    default: true
    noReload: true
  - name: relay__compression__slidingWindow
    desc: "Maintain a sliding window buffer for each connection. Improves compression, but uses more memory"
    default: true
    noReload: true

  - name: relay__logging__dumpInAll
    desc: "Dump all incoming messages"
    default: false
  - name: relay__logging__dumpInEvents
    desc: "Dump all incoming EVENT messages"
    default: false
  - name: relay__logging__dumpInReqs
    desc: "Dump all incoming REQ/CLOSE messages"
    default: false
  - name: relay__logging__dbScanPerf
    desc: "Log performance metrics for initial REQ database scans"
    default: false
  - name: relay__logging__invalidEvents
    desc: "Log reason for invalid event rejection? Can be disabled to silence excessive logging"
    default: true

  - name: relay__numThreads__ingester
    desc: Ingester threads: route incoming requests, validate events/sigs
    default: 3
    noReload: true
  - name: relay__numThreads__reqWorker
    desc: reqWorker threads: Handle initial DB scan for events
    default: 3
    noReload: true
  - name: relay__numThreads__reqMonitor
    desc: reqMonitor threads: Handle filtering of new events
    default: 3
    noReload: true
  - name: relay__numThreads__negentropy
    desc: negentropy threads: Handle negentropy protocol messages
    default: 2
    noReload: true

  - name: relay__negentropy__enabled
    desc: "Support negentropy protocol messages"
    default: true
  - name: relay__negentropy__maxSyncEvents
    desc: "Maximum records that sync will process before returning an error"
    default: 1000000

  - name: relay__rateLimit__enabled
    desc: "Enable per-pubkey posting rate limiting"
    default: false
  - name: relay__rateLimit__windowSeconds
    desc: "Time window (seconds) over which posts per pubkey are counted"
    default: 60
  - name: relay__rateLimit__maxEvents
    desc: "Maximum number of events a single pubkey may post within the window"
    default: 10
  - name: relay__rateLimit__mode
    desc: "Action when limit exceeded: \"reject\" (OK false) or \"shadow\" (OK true but not stored)"
    default: "reject"
  - name: relay__rateLimit__banOnExceed
    desc: "When a pubkey exceeds the rate limit, permanently ban it (reject ALL its events) until manually unbanned"
    default: false
  - name: relay__rateLimit__banListFile
    desc: "If non-empty, path to a file of banned pubkeys (64-char hex, one per line). Loaded at startup; auto-bans are appended here. Remove a line and restart to unban"
    default: ""
  - name: relay__rateLimit__kinds
    desc: "JSON array of event kinds to rate-limit, or empty string for all kinds. Example: \"[1,1111]\""
    default: ""
  - name: relay__rateLimit__excludeKinds
    desc: "JSON array of event kinds to EXEMPT from rate-limiting (takes precedence over kinds). Example: \"[7]\" to exempt reactions"
    default: ""
  - name: relay__rateLimit__exemptEphemeral
    desc: "Exempt ephemeral kinds (20000-29999) from rate-limiting. They are never stored, so they can't be used for storage abuse (e.g. WebRTC signaling)"
    default: true
  - name: relay__rateLimit__exemptReplaceable
    desc: "Exempt replaceable kinds (0, 3, 41, 10000-19999) from rate-limiting. Only the latest per pubkey+kind is stored, so they don't accumulate"
    default: true
  - name: relay__rateLimit__exemptAddressable
    desc: "Exempt addressable/parameterized-replaceable kinds (30000-39999) from rate-limiting. NOTE: these CAN accumulate via distinct d-tags, so leaving this false closes a storage-abuse vector"
    default: false

  - name: relay__ipRateLimit__enabled
    desc: "Enable per-IP posting rate limiting (requires real client IP; set relay.realIpHeader if behind a proxy). IPv6 is grouped by /64"
    default: false
  - name: relay__ipRateLimit__windowSeconds
    desc: "Time window (seconds) over which posts per IP are counted"
    default: 60
  - name: relay__ipRateLimit__maxEvents
    desc: "Maximum number of events a single IP (or IPv6 /64) may post within the window"
    default: 30
  - name: relay__ipRateLimit__mode
    desc: "Action when IP limit exceeded: \"reject\" (OK false) or \"shadow\" (OK true but not stored)"
    default: "reject"
  - name: relay__ipRateLimit__banOnExceed
    desc: "When an IP exceeds the rate limit, permanently ban it (reject ALL its events) until unbanned"
    default: false
  - name: relay__ipRateLimit__banListFile
    desc: "If non-empty, path to a file of banned IPs (one per line; IPv6 /64 written as prefix/64). Loaded at startup; auto-bans appended. Remove a line and restart to unban"
    default: ""
